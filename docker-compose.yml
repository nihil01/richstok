version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: richstok-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: richstok
      POSTGRES_USER: richstok
      POSTGRES_PASSWORD: richstok
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U richstok -d richstok"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
